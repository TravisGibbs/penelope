[general]
# The real shell to delegate to after screening
# real_shell = "/bin/bash"
# log_file = "~/.penelope/audit.jsonl"
# log_level = "info"
# session_context_size = 20

# Additional block rules (supplements built-in rules)
# [[tier1.block]]
# name = "custom-block"
# pattern = "some_dangerous_pattern"
# reason = "Why this is blocked"

# Additional allow rules (supplements built-in rules)
# [[tier1.allow]]
# name = "custom-allow"
# pattern = "^my-safe-tool\\s"

[tier2]
# NLI model endpoint for semantic risk classification
# endpoint = "http://localhost:8000/classify"
# timeout_ms = 100
# enabled = false

# What to do when tier2 is unavailable and a command is escalated:
#   "escalate" = ask the human for approval (default)
#   "allow"    = allow the command
#   "block"    = block the command
offline_action = "allow"

[remote]
# Remote API for centralized audit logging
# endpoint = "https://penelope-api.onrender.com/api/v1/events"
# api_key = "your-api-key"
# enabled = false

[human_in_the_loop]
# enabled = true
# timeout_seconds = 30
# default_action = "deny"  # deny | allow
